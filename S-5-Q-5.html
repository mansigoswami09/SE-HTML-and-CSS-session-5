<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookMyShow Movie Page</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background-color: white;
        color: black;
        text-align: center;
        padding: 20px;
    }

    .dark-mode{
        background-color: #222;
        color: white;
    }

    button{
        padding: 10px 15px;
        cursor: pointer;
        margin-bottom: 20px;
    }

    .movie-card{
        border: 1px solid gray;
        padding: 20px;
        border-radius: 8px;
        max-width: 300px;
        margin: auto;
    }
</style>
</head>
<body>

<button onclick="toggleMode()">Light / Dark Mode</button>

<div class="movie-card">
    <h2>3 Idiots</h2>
    <p>Comedy • Drama</p>
    <p>Rating: 8.4/10</p>
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
