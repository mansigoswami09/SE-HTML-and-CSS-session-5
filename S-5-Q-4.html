<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify playlist </title>
    <style>
        body{
            background-color: black;
            font-family: 'Segoe UI', sans-serif;
            padding:30px;
        }
        .playlist-item{
            background-color: #666;
            color:white;
            padding:10px 16px;
            margin: 5px;
            border-radius: 4px;
            cursor:pointer;
        }

        #current-song{
            background-color:#1DB954;
            color:black;
            font-weight: bold;
        }
    </style>
</head>
<body>
   <div class="playlist-item">For A Reason</div>
<div class="playlist-item" id="current-song">Perfect (Now playing)</div>
<div class="playlist-item">Die With A Smile</div>
</body>
</html>
